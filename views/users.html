<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuários – Ferramentas</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .users-page { max-width: 720px; padding: 2rem 1.5rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; color: #111; }
    .btn-new {
      padding: 0.5rem 1.1rem;
      background: #111; color: #fff;
      border: none; border-radius: 6px;
      font-size: 0.9rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .btn-new:hover { background: #333; }

    .users-table {
      width: 100%; border-collapse: collapse;
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 8px; overflow: hidden;
    }
    .users-table th {
      text-align: left; font-size: 0.75rem;
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #666;
      padding: 0.75rem 1rem; background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
    }
    .users-table td {
      padding: 0.85rem 1rem; font-size: 0.9rem;
      border-bottom: 1px solid #f0f0f0; color: #222;
    }
    .users-table tr:last-child td { border-bottom: none; }
    .badge-master {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      padding: 0.15rem 0.45rem; border-radius: 20px;
      background: #e8f1fd; color: #1a5fb4;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .actions { display: flex; gap: 0.5rem; }
    .btn-edit, .btn-del {
      padding: 0.3rem 0.75rem; border-radius: 5px;
      font-size: 0.82rem; font-family: inherit;
      cursor: pointer; border: 1px solid;
    }
    .btn-edit { background: #fff; border-color: #ccc; color: #333; }
    .btn-edit:hover { background: #f5f5f5; }
    .btn-del { background: #fff0f0; border-color: #fcc; color: #c00; }
    .btn-del:hover { background: #ffe0e0; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 10px;
      padding: 2rem; width: 100%; max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }
    .modal .field { margin-bottom: 1rem; }
    .modal .field label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 0.35rem; }
    .modal .field input {
      width: 100%; box-sizing: border-box;
      padding: 0.55rem 0.7rem; border: 1px solid #ddd;
      border-radius: 6px; font-size: 0.9rem;
      font-family: inherit; outline: none;
    }
    .modal .field input:focus { border-color: #555; }
    .modal .field small { font-size: 0.78rem; color: #888; display: block; margin-top: 0.25rem; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel {
      padding: 0.5rem 1rem; background: #f5f5f5;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.9rem; font-family: inherit; cursor: pointer;
    }
    .btn-save-modal {
      padding: 0.5rem 1.1rem; background: #111; color: #fff;
      border: none; border-radius: 6px;
      font-size: 0.9rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .btn-save-modal:hover { background: #333; }

    .modal-error {
      background: #fff0f0; border: 1px solid #fcc;
      color: #c00; border-radius: 6px;
      padding: 0.5rem 0.7rem; font-size: 0.85rem;
      margin-bottom: 1rem; display: none;
    }

    .empty-state { text-align: center; padding: 3rem 1rem; color: #999; font-size: 0.95rem; }
  </style>
</head>
<body class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-header">Ferramentas</div>
    <nav class="sidebar-nav">
      <a href="/">Início</a>
      <a href="/notepad">Bloco de Notas</a>
      <a href="/comex">Leitor COMEX</a>
      <span class="sidebar-section">Sistema</span>
      <a href="/users" class="active">Usuários</a>
      <a href="/config">Configurações</a>
    </nav>
    <div style="padding:1rem;margin-top:auto;border-top:1px solid #eee;">
      <div id="sidebarUser" style="font-size:0.8rem;color:#666;margin-bottom:0.5rem;"></div>
      <button onclick="logout()" style="font-size:0.8rem;background:none;border:none;color:#999;cursor:pointer;padding:0;font-family:inherit;">Sair</button>
    </div>
  </aside>

  <main class="dashboard-content">
    <div class="users-page">
      <div class="page-header">
        <h1>Gerenciar Usuários</h1>
        <button class="btn-new" onclick="openModal()">+ Novo Usuário</button>
      </div>
      <table class="users-table">
        <thead>
          <tr>
            <th>Usuário</th>
            <th>Criado em</th>
            <th>Tipo</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="4" class="empty-state">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Novo Usuário</h2>
      <div class="modal-error" id="modalError"></div>
      <div class="field">
        <label for="inputUsername">Usuário</label>
        <input type="text" id="inputUsername" autocomplete="off">
      </div>
      <div class="field">
        <label for="inputPassword">Senha</label>
        <input type="password" id="inputPassword" autocomplete="new-password">
        <small id="passwordHint">Deixe em branco para manter a senha atual (ao editar).</small>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save-modal" onclick="saveUser()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    let editingId = null;

    async function loadUsers() {
      const res = await fetch('/api/users');
      if (!res.ok) return;
      const users = await res.json();
      const body = document.getElementById('usersBody');
      if (!users.length) {
        body.innerHTML = '<tr><td colspan="4" class="empty-state">Nenhum usuário cadastrado além do master.</td></tr>';
        return;
      }
      body.innerHTML = users.map(u => `
        <tr>
          <td>${esc(u.username)}</td>
          <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString('pt-BR') : '—'}</td>
          <td><span class="badge-master" style="background:#f0f0f0;color:#666;">Usuário</span></td>
          <td><div class="actions">
            <button class="btn-edit" onclick='editUser(${JSON.stringify(u)})'>Editar</button>
            <button class="btn-del" onclick="deleteUser('${u.id}', '${esc(u.username)}')">Excluir</button>
          </div></td>
        </tr>
      `).join('');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function openModal(user) {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Novo Usuário';
      document.getElementById('inputUsername').value = '';
      document.getElementById('inputPassword').value = '';
      document.getElementById('passwordHint').style.display = 'none';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('inputUsername').focus();
    }

    function editUser(u) {
      editingId = u.id;
      document.getElementById('modalTitle').textContent = 'Editar Usuário';
      document.getElementById('inputUsername').value = u.username;
      document.getElementById('inputPassword').value = '';
      document.getElementById('passwordHint').style.display = 'block';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    async function saveUser() {
      const username = document.getElementById('inputUsername').value.trim();
      const password = document.getElementById('inputPassword').value;
      const errEl = document.getElementById('modalError');
      errEl.style.display = 'none';

      if (!username) { errEl.textContent = 'O usuário é obrigatório.'; errEl.style.display = 'block'; return; }
      if (!editingId && !password) { errEl.textContent = 'A senha é obrigatória.'; errEl.style.display = 'block'; return; }

      const body = { username };
      if (password) body.password = password;

      const url = editingId ? `/api/users/${editingId}` : '/api/users';
      const method = editingId ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (res.ok) {
        closeModal();
        loadUsers();
      } else {
        errEl.textContent = data.error || 'Erro ao salvar.';
        errEl.style.display = 'block';
      }
    }

    async function deleteUser(id, username) {
      if (!confirm(`Excluir o usuário "${username}"?`)) return;
      const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
      if (res.ok) loadUsers();
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    // Load current user info for sidebar
    fetch('/api/auth/me').then(r => r.json()).then(me => {
      document.getElementById('sidebarUser').textContent = me.username || '';
    });

    loadUsers();
  </script>
</body>
</html>
