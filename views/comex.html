<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leitor COMEX – Giovanni Tools</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .comex-layout {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 860px;
      padding: 2rem 0;
    }

    .comex-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.25rem;
    }

    .comex-subtitle {
      color: #666;
      font-size: 0.95rem;
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #fafafa;
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: #555;
      background: #f3f3f3;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .upload-text {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 0.35rem;
    }

    .upload-hint {
      font-size: 0.8rem;
      color: #999;
    }

    /* File loaded state */
    .file-loaded {
      background: #fff;
      border: 1px solid #d0e8d0;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .file-loaded-icon {
      font-size: 2rem;
      flex-shrink: 0;
    }

    .file-loaded-info {
      flex: 1;
      min-width: 0;
    }

    .file-loaded-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-loaded-type {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.15rem;
    }

    .btn-clear {
      padding: 0.4rem 0.9rem;
      background: #fff;
      color: #c0392b;
      border: 1px solid #c0392b;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-clear:hover { background: #fff0f0; }

    /* Chat area */
    .chat-area {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      height: 480px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chat-empty {
      margin: auto;
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
    }

    .chat-msg {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      max-width: 90%;
    }

    .chat-msg--user { align-self: flex-end; align-items: flex-end; }
    .chat-msg--assistant { align-self: flex-start; align-items: flex-start; }

    .chat-msg-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #aaa;
    }

    .chat-msg-bubble {
      padding: 0.65rem 1rem;
      border-radius: 10px;
      font-size: 0.92rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-msg--user .chat-msg-bubble {
      background: #222;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .chat-msg--assistant .chat-msg-bubble {
      background: #f3f3f3;
      color: #111;
      border-bottom-left-radius: 3px;
    }

    .chat-msg-bubble.error {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
    }

    /* Spinner */
    .spinner-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      color: #888;
      font-size: 0.88rem;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Chat input */
    .chat-input-row {
      border-top: 1px solid #e0e0e0;
      padding: 0.75rem;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      resize: none;
      border: 1px solid #ddd;
      border-radius: 7px;
      padding: 0.55rem 0.75rem;
      font-size: 0.92rem;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.15s;
    }

    .chat-input:focus { border-color: #555; }

    .btn-send {
      padding: 0.55rem 1.1rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.92rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .btn-send:hover { opacity: 0.82; }
    .btn-send:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-header">Giovanni Tools</div>
    <nav class="sidebar-nav">
      <a href="/">Início</a>
      <a href="/notepad">Bloco de Notas</a>
      <a href="/comex" class="active">Leitor COMEX</a>
      <span class="sidebar-section">Sistema</span>
      <a href="/config">Configurações</a>
    </nav>
  </aside>

  <main class="dashboard-content">
    <div class="comex-layout">
      <div>
        <div class="comex-title">Leitor COMEX</div>
        <div class="comex-subtitle">Envie um documento e faça perguntas sobre ele.</div>
      </div>

      <!-- Upload zone (shown when no file loaded) -->
      <div id="uploadSection">
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.webp">
          <div class="upload-icon">📂</div>
          <div class="upload-text">Arraste um arquivo aqui ou clique para selecionar</div>
          <div class="upload-hint">PDF, PNG, JPG ou WEBP — invoice, packing list, proforma, BL</div>
        </div>
      </div>

      <!-- File loaded state (hidden until file selected) -->
      <div id="fileLoadedSection" style="display:none">
        <div class="file-loaded">
          <div class="file-loaded-icon" id="fileIcon">📄</div>
          <div class="file-loaded-info">
            <div class="file-loaded-name" id="fileName">—</div>
            <div class="file-loaded-type" id="fileType">—</div>
          </div>
          <button class="btn-clear" id="btnClear">Trocar documento</button>
        </div>
      </div>

      <!-- Chat area (hidden until file selected) -->
      <div id="chatSection" style="display:none">
        <div class="chat-area">
          <div class="chat-messages" id="chatMessages">
            <div class="chat-empty" id="chatEmpty">Faça uma pergunta sobre o documento acima.</div>
          </div>
          <div class="chat-input-row">
            <textarea class="chat-input" id="chatInput" rows="1" placeholder="Qual o valor total da invoice?"></textarea>
            <button class="btn-send" id="btnSend">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const state = {
      fileBase64: null,
      mediaType: null,
      fileName: null,
      history: [],
      loading: false,
    };

    const uploadSection = document.getElementById('uploadSection');
    const fileLoadedSection = document.getElementById('fileLoadedSection');
    const chatSection = document.getElementById('chatSection');
    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const fileIcon = document.getElementById('fileIcon');
    const fileNameEl = document.getElementById('fileName');
    const fileTypeEl = document.getElementById('fileType');
    const btnClear = document.getElementById('btnClear');
    const chatMessages = document.getElementById('chatMessages');
    const chatEmpty = document.getElementById('chatEmpty');
    const chatInput = document.getElementById('chatInput');
    const btnSend = document.getElementById('btnSend');

    // Drag-and-drop
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) loadFile(fileInput.files[0]);
    });

    function loadFile(file) {
      const allowed = ['application/pdf', 'image/png', 'image/jpeg', 'image/webp'];
      if (!allowed.includes(file.type)) {
        alert('Tipo de arquivo não suportado. Use PDF, PNG, JPG ou WEBP.');
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(',')[1];
        state.fileBase64 = base64;
        state.mediaType = file.type;
        state.fileName = file.name;
        state.history = [];

        fileNameEl.textContent = file.name;
        fileTypeEl.textContent = file.type;
        fileIcon.textContent = file.type === 'application/pdf' ? '📋' : '🖼️';

        uploadSection.style.display = 'none';
        fileLoadedSection.style.display = '';
        chatSection.style.display = '';
        clearMessages();
      };
      reader.readAsDataURL(file);
    }

    btnClear.addEventListener('click', () => {
      state.fileBase64 = null;
      state.mediaType = null;
      state.fileName = null;
      state.history = [];
      fileInput.value = '';
      uploadSection.style.display = '';
      fileLoadedSection.style.display = 'none';
      chatSection.style.display = 'none';
    });

    function clearMessages() {
      chatMessages.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'chat-empty';
      empty.id = 'chatEmpty';
      empty.textContent = 'Faça uma pergunta sobre o documento acima.';
      chatMessages.appendChild(empty);
    }

    function appendMessage(role, text, isError) {
      // Remove empty placeholder
      const empty = chatMessages.querySelector('.chat-empty');
      if (empty) empty.remove();

      const wrap = document.createElement('div');
      wrap.className = `chat-msg chat-msg--${role}`;

      const label = document.createElement('div');
      label.className = 'chat-msg-label';
      label.textContent = role === 'user' ? 'Você' : 'Assistente';

      const bubble = document.createElement('div');
      bubble.className = 'chat-msg-bubble' + (isError ? ' error' : '');
      bubble.textContent = text;

      wrap.appendChild(label);
      wrap.appendChild(bubble);
      chatMessages.appendChild(wrap);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return wrap;
    }

    function appendSpinner() {
      const empty = chatMessages.querySelector('.chat-empty');
      if (empty) empty.remove();

      const wrap = document.createElement('div');
      wrap.className = 'chat-msg chat-msg--assistant';
      wrap.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><span>Analisando documento...</span></div>';
      chatMessages.appendChild(wrap);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return wrap;
    }

    async function sendMessage() {
      const question = chatInput.value.trim();
      if (!question || state.loading || !state.fileBase64) return;

      state.loading = true;
      btnSend.disabled = true;
      chatInput.value = '';
      chatInput.style.height = '';

      appendMessage('user', question);

      const spinnerEl = appendSpinner();

      try {
        const res = await fetch('/api/comex', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fileBase64: state.fileBase64,
            mediaType: state.mediaType,
            history: state.history,
            question,
          }),
        });
        const data = await res.json();
        spinnerEl.remove();

        if (!res.ok || data.error) {
          appendMessage('assistant', data.error || 'Erro desconhecido.', true);
        } else {
          appendMessage('assistant', data.answer);
          state.history.push({ role: 'user', text: question });
          state.history.push({ role: 'assistant', text: data.answer });
        }
      } catch (err) {
        spinnerEl.remove();
        appendMessage('assistant', 'Erro de rede: ' + err.message, true);
      } finally {
        state.loading = false;
        btnSend.disabled = false;
        chatInput.focus();
      }
    }

    btnSend.addEventListener('click', sendMessage);

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
